name: Build and Deploy Portfolio (OVH SSR)

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install and Build
        run: |
          npm ci
          npm run build

      - name: 📂 Deploy to VPS (RSYNC)
        uses: easingthemes/ssh-deploy@v5.1.0
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }} # Vérifie si ton secret s'appelle HOST ou SSH_HOST
          REMOTE_USER: ${{ secrets.SSH_USER }} # Vérifie si ton secret s'appelle USER ou SSH_USER
          SOURCE: "." # On envoie tout (sauf exclus) pour avoir le package.json
          TARGET: "/var/www/portfolio_app"
          # On exclut les dossiers inutiles sur le serveur
          ARGS: "-rlgoDvc --delete --exclude='.git*' --exclude='node_modules' --exclude='src'"

      - name: 🔄 Restart Application via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Plus besoin du port 22009 ici
          script: |
            cd /var/www/portfolio_app
            # Installation propre des dépendances de prod sur le VPS
            npm install --omit=dev
            # On lance sur le port 4321 pour correspondre à Nginx
            PORT=4321 pm2 restart portfolio || PORT=4321 pm2 start dist/server/entry.mjs --name portfolio
